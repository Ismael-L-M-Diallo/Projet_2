<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectHub</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS pour look Reddit-like -->
    <style>
        body { background-color: #1a1a1b; color: #d9d9d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .navbar { background-color: #0f0f10 !important; border-bottom: 1px solid #333; }
        .navbar-brand { color: #fff !important; font-weight: bold; font-size: 1.5rem; }
        .nav-link { color: #b0b3b8 !important; }
        .nav-link:hover { color: #fff !important; }
        .task-card { background-color: #2a2a2b; border: 1px solid #404244; margin-bottom: 1rem; }
        .task-card.completed { opacity: 0.6; background-color: #1f1f1f; }
        .task-title { cursor: pointer; }
        .chat-messages { height: 400px; overflow-y: auto; background-color: #2a2a2b; border: 1px solid #404244; padding: 1rem; }
        .message { margin-bottom: 1rem; }
        .message.sent { text-align: right; }
        .message-bubble { display: inline-block; max-width: 70%; padding: 0.75rem 1rem; border-radius: 18px; }
        .sent .message-bubble { background-color: #0079d3; color: white; }
        .received .message-bubble { background-color: #404244; color: #d9d9d9; }
    </style>
</head>
<body>
    <!-- Navbar Reddit-like -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">connectHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#tasks">Tâches</a></li>
                    <li class="nav-item"><a class="nav-link" href="#chat">Chat</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar Chat (25%) -->
            <div class="col-md-3">
                <h5>Chat</h5>
                <div id="chat-messages" class="chat-messages mb-3"></div>
                <div class="input-group">
                    <input type="text" id="chat-input" class="form-control" placeholder="Tapez un message...">
                    <button class="btn btn-primary" id="send-chat">Envoyer</button>
                </div>
            </div>
            <!-- Main Tasks (75%) -->
            <div class="col-md-9">
                <h2 id="tasks">Gestionnaire de Tâches</h2>
                <!-- Formulaire Ajout -->
                <div class="card task-card mb-3">
                    <div class="card-body">
                        <input type="text" id="task-title" class="form-control mb-2" placeholder="Titre de la tâche">
                        <button class="btn btn-success" id="add-task">Ajouter</button>
                    </div>
                </div>
                <!-- Liste Tâches -->
                <div id="task-list"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript App -->
    <script src="app.js"></script>
</body>
</html>
